<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="wrap">

        <div class="brand">
            <div class="brand-orb">✦</div>
            <div class="brand-text">
                <h1>AI Personal Assistant</h1>
                <p>Developed By Vedant Dixit</p>
            </div>
            <div class="brand-badge">
                <div class="live-dot"></div>
                Online
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-val purple">2</div>
                <div class="stat-label">Modules</div>
            </div>
            <div class="stat">
                <div class="stat-val teal">AI</div>
                <div class="stat-label">Powered</div>
            </div>
            <div class="stat">
                <div class="stat-val amber">∞</div>
                <div class="stat-label">Queries</div>
            </div>
        </div>

        <!-- Ask Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon icon-purple">✦</div>
                <div class="card-meta">
                    <div class="card-title">Ask anything</div>
                    <div class="card-subtitle">Natural language questions</div>
                </div>
                <span class="chip chip-purple">GROQ</span>
            </div>
            <div class="input-row">
                <input type="text" id="question" placeholder="What would you like to know?" />
                <button class="btn btn-purple" id="askBtn" onclick="handleAsk()">
                    Ask <span class="btn-arrow">→</span>
                </button>
            </div>
            <div class="loading" id="ans-loading">
                <div class="dot purple"></div>
                <div class="dot purple"></div>
                <div class="dot purple"></div>
                <span class="loading-text">Thinking…</span>
            </div>
            <div class="result-box purple-accent" id="answer-box">
                <p id="answer"></p>
            </div>
        </div>

        <!-- Summarize Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon icon-teal">✉</div>
                <div class="card-meta">
                    <div class="card-title">Summarize email</div>
                    <div class="card-subtitle">Get instant email summary</div>
                </div>
                <span class="chip chip-teal">NLP</span>
            </div>
            <textarea id="email" placeholder="Paste your email here to get a concise summary…"></textarea>
            <div class="submit-row">
                <button class="btn btn-teal" id="sumBtn" onclick="handleSummarize()">
                    Summarize <span class="btn-arrow">→</span>
                </button>
            </div>
            <div class="loading" id="summary-loading">
                <div class="dot teal"></div>
                <div class="dot teal"></div>
                <div class="dot teal"></div>
                <span class="loading-text">Processing…</span>
            </div>
            <div class="result-box teal-accent" id="summary-box">
                <p id="summary"></p>
            </div>
        </div>

        <div class="footer">AI Personal Assistant &mdash; Built with Flask</div>

    </div>

    <script>
        async function handleAsk() {
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            const loading   = document.getElementById('ans-loading');
            const answerBox = document.getElementById('answer-box');
            const btn       = document.getElementById('askBtn');

            loading.style.display   = 'flex';
            answerBox.style.display = 'none';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('question', question);

            const res  = await fetch('/ask', { method: 'POST', body: formData });
            const data = await res.json();

            document.getElementById('answer').innerText = data.answer;
            answerBox.style.display = 'block';
            loading.style.display   = 'none';
            btn.disabled = false;
        }

        async function handleSummarize() {
            const email = document.getElementById('email').value.trim();
            if (!email) return;

            const loading    = document.getElementById('summary-loading');
            const summaryBox = document.getElementById('summary-box');
            const btn        = document.getElementById('sumBtn');

            loading.style.display    = 'flex';
            summaryBox.style.display = 'none';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('email', email);

            const res  = await fetch('/summarize', { method: 'POST', body: formData });
            const data = await res.json();

            document.getElementById('summary').innerText = data.summary;
            summaryBox.style.display = 'block';
            loading.style.display    = 'none';
            btn.disabled = false;
        }

        document.getElementById('question').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleAsk();
        });
    </script>
</body>
</html>
